<!DOCTYPE html>
<html lang="as">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>৪০৪ — ন্যায়সেতু</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Assamese', sans-serif;
            background: #faf9f6;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .notfound-container { max-width: 400px; }
        .notfound-code { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 700; color: #c9a961; line-height: 1; }
        h1 { font-family: 'Noto Serif Assamese', serif; font-size: 1.5rem; margin: 1rem 0 0.75rem; color: #1a2332; }
        p { font-size: 0.95rem; color: #555; line-height: 1.6; margin-bottom: 1.5rem; }
        a {
            display: inline-block; background: #1a2332; color: #fff; text-decoration: none;
            padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.95rem;
            font-family: 'Noto Sans Assamese', sans-serif;
        }
        a:hover { background: #2a3542; }
    </style>
</head>
<body>
    <div class="notfound-container">
        <div class="notfound-code">৪০৪</div>
        <h1>পৃষ্ঠা পোৱা নগ'ল</h1>
        <p>আপুনি বিচৰা পৃষ্ঠাটো পোৱা নগ'ল। সম্ভৱতঃ ই স্থানান্তৰিত হৈছে বা বিলুপ্ত হৈছে।</p>
        <a href="/">ঘৰলৈ যাওক</a>
    </div>
</body>
</html>
